<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小组学习成果展示看板</title>
    <style>
	
        :root {
            --primary-color: #2c3e50;
            --bg-color: #f4f7f6;
            --border-color: #e0e0e0;
            /* 总行高设为 90px */
            --total-height: 90px;
            /* 标题子行高（活动内容行、读悟思讲行）各占一半 */
            --sub-height: 45px;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; 
        }

        th, td {
            border: 1px solid var(--border-color);
            text-align: center;
            padding: 0;
            vertical-align: middle;
            overflow: hidden;
        }

        /* 标题行基础样式 */
        thead {
            background-color: var(--primary-color);
            color: white;
        }

        th { font-weight: 600; user-select: none; }

        /* 特殊高度控制 */
        .height-main { height: var(--total-height); } /* 小组名称和评价的高度 */
        .height-sub { height: var(--sub-height); }   /* 活动内容和读悟思讲的高度 */
        
        /* 交互列和内容列的高度保持一致 */
        tbody td { height: var(--total-height); }

        /* 评价标题增加点击交互样式 */
        #eval-header { 
            cursor: pointer; 
            background-color: #34495e; 
            transition: background 0.3s;
        }
        #eval-header:hover { background-color: #1abc9c; }

        /* 列宽分配 */
        .col-group { width: 120px; background-color: #1a252f; }
        .col-eval { width: 180px; }
        
        .interactive-cell { cursor: pointer; }
        tbody tr:nth-child(even) { background-color: #fafafa; }
        tbody tr:hover { background-color: #f0f7ff; }

        /* 勋章图片样式 */
        .medal-img {
            height: 60px; 
            width: auto;
            max-width: 90%;
            object-fit: contain;
            display: inline-block;
            vertical-align: middle;
            pointer-events: none;
            animation: popIn 0.2s ease-out;
        }

        /* 评价图片样式 */
        .eval-img {
            height: 75px; 
            width: auto;
            max-width: 95%;
            object-fit: contain;
            display: inline-block;
            vertical-align: middle;
            animation: fadeIn 0.4s ease-in;
        }

        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

<div class="container">
    <h2>文化导游记者团活动表现评价表</h2>
    <table>
        <thead>
            <tr>
                <th rowspan="2" class="col-group height-main">小组名称</th>
                <th colspan="4" class="height-sub">活动内容</th>
                <th rowspan="2" id="eval-header" class="col-eval height-main" title="点击判定优秀小组">活动评价</th>
            </tr>
            <tr>
                <th class="height-sub">读</th>
                <th class="height-sub">悟</th>
                <th class="height-sub">思</th>
                <th class="height-sub">讲</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>
</div>

<script>
    // --- 1. 网络勋章图片地址配置 ---
    const columnImages = {
        1: "https://test.fukit.cn/autoupload/fr/mSpaGI3pi14-hUHSpXwRK9QsAZsNtWRLDxDp3gHfqRayl5f0KlZfm6UsKj-HyTuv/20260404/oiqV/2064X2030/QQ%E5%9B%BE%E7%89%8720260404145241.png/webp", // 读 列的图片 (例如：书本/对勾)
        2: "https://test.fukit.cn/autoupload/fr/mSpaGI3pi14-hUHSpXwRK9QsAZsNtWRLDxDp3gHfqRayl5f0KlZfm6UsKj-HyTuv/20260404/0bg7/2064X2030/QQ%E5%9B%BE%E7%89%8720260404145259.png/webp", // 悟 列的图片 (例如：灯泡)
        3: "https://test.fukit.cn/autoupload/fr/mSpaGI3pi14-hUHSpXwRK9QsAZsNtWRLDxDp3gHfqRayl5f0KlZfm6UsKj-HyTuv/20260404/Gxng/2064X2030/QQ%E5%9B%BE%E7%89%8720260404145254.png/webp", // 思 列的图片 (例如：思考)
        4: "https://test.fukit.cn/autoupload/fr/mSpaGI3pi14-hUHSpXwRK9QsAZsNtWRLDxDp3gHfqRayl5f0KlZfm6UsKj-HyTuv/20260404/4KI7/2064X2030/QQ%E5%9B%BE%E7%89%8720260404145304.png/webp"  // 讲 列的图片 (例如：扩音器)
    };

    // --- 2. 网络评价结果图片地址配置 ---
    const evalImages = {
        excellent: "https://test.fukit.cn/autoupload/fr/mSpaGI3pi14-hUHSpXwRK9QsAZsNtWRLDxDp3gHfqRayl5f0KlZfm6UsKj-HyTuv/20260404/D76S/3025X1386/QQ%E5%9B%BE%E7%89%8720260404145342.png/webp", // 十分优秀 (金牌)
        
    };

    const groupNames = ["第一组", "第二组", "第三组", "第四组", "第五组", "第六组", "第七组", "第八组", "第九组", "第十组", "第十一组", "第十二组", "第十三组"];
    const tbody = document.getElementById('table-body');

    // 渲染表格行
    groupNames.forEach(name => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td><strong>${name}</strong></td>
            <td class="interactive-cell" data-col="1"></td>
            <td class="interactive-cell" data-col="2"></td>
            <td class="interactive-cell" data-col="3"></td>
            <td class="interactive-cell" data-col="4"></td>
            <td class="evaluation-cell"></td>
        `;
        tbody.appendChild(row);
    });

    let clickTimer = null;

    // 处理单击点亮勋章
    tbody.addEventListener('click', function(e) {
        const cell = e.target.closest('td');
        if (!cell || !cell.classList.contains('interactive-cell')) return;
        
        if (clickTimer) return;
        
        clickTimer = setTimeout(() => {
            const colIdx = cell.getAttribute('data-col');
            // 插入对应列的勋章图片
            cell.innerHTML = `<img src="${columnImages[colIdx]}" class="medal-img">`;
            clickTimer = null;
        }, 220); 
    });

    // 处理双击熄灭勋章
    tbody.addEventListener('dblclick', function(e) {
        const cell = e.target.closest('td');
        if (cell && cell.classList.contains('interactive-cell')) {
            clearTimeout(clickTimer);
            clickTimer = null;
            cell.innerHTML = ''; // 清空内容
        }
    });


// --- 修改后的核心逻辑：点击表头触发全部评价 ---
    document.getElementById('eval-header').addEventListener('click', function() {
        const allRows = tbody.querySelectorAll('tr');
        
        allRows.forEach(row => {
            // 统计当前行点亮的勋章图片数量
            const medalsCount = row.querySelectorAll('.medal-img').length;
            const evalCell = row.querySelector('.evaluation-cell');
            
            // 无论之前有什么，先清空评价列
            evalCell.innerHTML = ''; 

            // 【关键修改】：只有当勋章等于 4 个时，才插入图片；否则保持清空状态
            if (medalsCount === 4) {
                evalCell.innerHTML = `<img src="${evalImages.excellent}" class="eval-img">`;
            }
            // 删除了 else 部分，所以不满 4 个时什么都不会发生
        });
    });
</script>

</body>
</html>
